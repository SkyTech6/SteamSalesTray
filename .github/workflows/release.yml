name: Release Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without the v prefix (example: 1.2.3)"
        required: true
        type: string
      target_ref:
        description: Optional branch, tag, or commit SHA to release from
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Resolve release ref
        id: ref
        shell: pwsh
        run: |
          $refInput = "${{ inputs.target_ref }}"
          if ([string]::IsNullOrWhiteSpace($refInput)) {
            $refInput = "${{ github.event.repository.default_branch }}"
          }
          "release_ref=$refInput" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.release_ref }}
          fetch-depth: 0

      - name: Validate version and prepare metadata
        id: meta
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Invalid version '$version'. Use semantic version X.Y.Z without a v prefix."
          }

          $tag = "v$version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Ensure release tag does not already exist
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"

          git fetch --tags --force origin

          $localTag = git tag --list "$tag"
          if (-not [string]::IsNullOrWhiteSpace($localTag)) {
            throw "Tag '$tag' already exists locally."
          }

          $remoteTag = git ls-remote --tags origin "refs/tags/$tag"
          if (-not [string]::IsNullOrWhiteSpace($remoteTag)) {
            throw "Tag '$tag' already exists on origin."
          }

      - name: Configure CMake
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        shell: pwsh
        run: cmake --build build --config Release

      - name: Run tests
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Prepare release asset
        id: asset
        shell: pwsh
        run: |
          $artifactDir = "release"
          $sourceExe = "build/Release/SteamSalesTray.exe"
          $assetExe = "$artifactDir/SteamSalesTray.exe"

          if (-not (Test-Path $sourceExe)) {
            throw "Expected executable not found at '$sourceExe'."
          }

          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          Copy-Item -Path $sourceExe -Destination $assetExe -Force

          $hash = (Get-FileHash -Algorithm SHA256 -Path $assetExe).Hash.ToLower()
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create and push annotated tag
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Create GitHub Release and upload asset
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: SteamSalesTray ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/SteamSalesTray.exe

      - name: Publish workflow summary
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Release Published"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Version: ${{ steps.meta.outputs.version }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Tag: ${{ steps.meta.outputs.tag }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Source ref: ${{ steps.ref.outputs.release_ref }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Commit: ${{ github.sha }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Asset: SteamSalesTray.exe"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- SHA256: ${{ steps.asset.outputs.sha256 }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Release URL: ${{ steps.release.outputs.url }}"
